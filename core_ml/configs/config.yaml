defaults:
  - attention: vanilla
  - model: transformer
  - positional: sinusoidal
  - training: default
  - _self_

experiment_name: "baseline_transformer"
seed: 42
output_dir: "${hydra:runtime.output_dir}"

dataset:
  name: "Salesforce/wikitext"
  config_name: "wikitext-2-raw-v1"
  seq_len: 1024
  batch_size: 8
  num_workers: 2
  pin_memory: true
