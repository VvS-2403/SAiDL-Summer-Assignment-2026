name: "hybrid_transformer"
d_model: 512
n_layers: 6
n_heads: 8
d_ff: 2048
dropout: 0.1
vocab_size: 50257
max_seq_len: 1024

# Nested structure required - train.py reads cfg.model.hybrid.type and cfg.model.hybrid.conv_kernel_size
hybrid:
  type: "conv_before_attn"   # Options: conv_before_attn | gated_conv_ffn | interleaved
  conv_kernel_size: 3
